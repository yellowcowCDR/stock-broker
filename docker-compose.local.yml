version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: hermes-postgres-local
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hermes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
