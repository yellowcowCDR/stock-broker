spring:
  application:
    name: hermes-trading-broker
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:mock}

  jackson:
    time-zone: ${TZ:UTC}

  cache:
    type: caffeine
    caffeine:
      spec: expireAfterWrite=30m

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hermes}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

logging:
  level:
    com.hermes.broker: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,scheduledtasks
  endpoint:
    health:
      show-details: always

broker:
  monitoring:
    enabled: ${BROKER_MONITORING_ENABLED:true}
    context-warning-before: ${MONITOR_CONTEXT_WARNING_BEFORE:1m}
    news-max-age: ${MONITOR_NEWS_MAX_AGE:24h}
    watchlist-max-age: ${MONITOR_WATCHLIST_MAX_AGE:15m}
    overview-max-age: ${MONITOR_OVERVIEW_MAX_AGE:10m}
    external-failure-alert-window: ${MONITOR_EXTERNAL_FAILURE_WINDOW:15m}
    reconciliation-failure-alert-window: ${MONITOR_RECONCILIATION_FAILURE_WINDOW:30m}
    database-failure-alert-window: ${MONITOR_DATABASE_FAILURE_WINDOW:15m}
    cron-grace: ${MONITOR_CRON_GRACE:5m}

springdoc:
  show-actuator: true



external-api:
  fail-fast: ${EXTERNAL_API_FAIL_FAST:false}
  opendart:
    enabled: ${OPENDART_ENABLED:true}
    base-url: https://opendart.fss.or.kr
    api-key: ${OPENDART_API_KEY:}
    connect-timeout: ${OPENDART_CONNECT_TIMEOUT:3s}
    read-timeout: ${OPENDART_READ_TIMEOUT:10s}
    corp-code-cache-ttl: ${OPENDART_CORP_CODE_CACHE_TTL:24h}
    corp-code-sync-cron: '${OPENDART_CORP_CODE_SYNC_CRON:0 0 4 * * *}'
  naver-news:
    enabled: ${NAVER_NEWS_ENABLED:true}
    base-url: https://openapi.naver.com
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
    connect-timeout: ${NAVER_NEWS_CONNECT_TIMEOUT:3s}
    read-timeout: ${NAVER_NEWS_READ_TIMEOUT:5s}
    default-display: ${NAVER_NEWS_DEFAULT_DISPLAY:20}
    max-display: ${NAVER_NEWS_MAX_DISPLAY:100}
    cache-ttl: ${NAVER_NEWS_CACHE_TTL:10m}
    freshness-threshold: ${NAVER_NEWS_FRESHNESS_THRESHOLD:24h}
  alpha-vantage:
    enabled: ${ALPHA_VANTAGE_ENABLED:false}
    base-url: https://www.alphavantage.co
    api-key: ${ALPHA_VANTAGE_API_KEY:}
    connect-timeout: ${ALPHA_VANTAGE_CONNECT_TIMEOUT:3s}
    read-timeout: ${ALPHA_VANTAGE_READ_TIMEOUT:15s}
    cache-ttl: ${ALPHA_VANTAGE_CACHE_TTL:12h}
    freshness-threshold: ${ALPHA_VANTAGE_FRESHNESS_THRESHOLD:24h}
    earnings-horizon: ${ALPHA_VANTAGE_EARNINGS_HORIZON:3month}

market-data:
  watchlist:
    domestic-limit: ${WATCHLIST_DOMESTIC_LIMIT:10}
    overseas-per-exchange-limit: ${WATCHLIST_OVERSEAS_PER_EXCHANGE_LIMIT:5}
    max-candidates: ${WATCHLIST_MAX_CANDIDATES:25}
    min-domestic-volume: ${WATCHLIST_MIN_DOMESTIC_VOLUME:100000}
  context:
    overview-freshness: ${MARKET_OVERVIEW_FRESHNESS:5m}
    max-validity: ${MARKET_CONTEXT_MAX_VALIDITY:5m}
    history-limit: ${MARKET_CONTEXT_HISTORY_LIMIT:100}

kis:
  rate-limit:
    enabled: true
    acquire-timeout: 30s
  retry:
    query:
      max-attempts: 3
      multiplier: 2.0
      jitter-min: 100ms
      jitter-max: 300ms
    order:
      max-attempts: 1
  token:
    minimum-issue-interval: 60s
    refresh-before-expiration: 5m
  queue:
    max-size: 100

trading:
  autonomy-mode: ${AUTONOMY_MODE:ANALYSIS_ONLY}
  real-order:
    enabled: ${REAL_ORDER_ENABLED:false}
  kill-switch:
    enabled: ${ENTRY_KILL_SWITCH_ENABLED:true}
  overseas-order:
    enabled: ${OVERSEAS_ORDER_ENABLED:false}
  admin-reset:
    enabled: ${ADMIN_RESET_ENABLED:false}
  risk:
    version: ${RISK_POLICY_VERSION:v1}
    daily-max-loss-rate: ${DAILY_MAX_LOSS_RATE:0.03}
    max-order-amount: ${MAX_ORDER_AMOUNT:100000}
    max-daily-trades: ${MAX_DAILY_TRADES:5}
    max-position-count: ${MAX_POSITION_COUNT:5}
    max-sector-exposure-rate: ${MAX_SECTOR_EXPOSURE_RATE:0.40}
    max-stock-exposure-rate: ${MAX_STOCK_EXPOSURE_RATE:0.25}
    max-price-deviation-rate: ${MAX_PRICE_DEVIATION_RATE:0.10}
    allow-averaging-down: ${ALLOW_AVERAGING_DOWN:false}
    allow-margin-trading: ${ALLOW_MARGIN_TRADING:false}
    live-trading-enabled: ${LIVE_TRADING_ENABLED:false}
    require-sector-data: ${REQUIRE_SECTOR_DATA:true}
    require-daily-loss-data: ${REQUIRE_DAILY_LOSS_DATA:true}
    overseas:
      max-order-amount-usd: ${OVERSEAS_MAX_ORDER_AMOUNT_USD:1000}
      max-daily-trades: ${OVERSEAS_MAX_DAILY_TRADES:5}
      max-position-count: ${OVERSEAS_MAX_POSITION_COUNT:5}
      max-stock-exposure-rate: ${OVERSEAS_MAX_STOCK_EXPOSURE_RATE:0.25}
      allow-averaging-down: ${OVERSEAS_ALLOW_AVERAGING_DOWN:false}
  strategy:
    minimum-trade-sample: ${MINIMUM_TRADE_SAMPLE:20}
    minimum-evaluation-days: ${MINIMUM_EVALUATION_DAYS:10}
    maximum-parameter-changes-per-upgrade: ${MAX_PARAMETER_CHANGES_PER_UPGRADE:2}
    rollback-enabled: ${STRATEGY_ROLLBACK_ENABLED:true}
    rollback-minimum-sample: ${ROLLBACK_MINIMUM_SAMPLE:10}
    rollback-max-drawdown-increase-rate: ${ROLLBACK_MAX_DRAWDOWN_INCREASE_RATE:0.30}
    rollback-performance-degradation-rate: ${ROLLBACK_PERFORMANCE_DEGRADATION_RATE:0.20}
