spring:
  application:
    name: hermes-trading-broker
  profiles:
    active: mock

  cache:
    type: caffeine
    caffeine:
      spec: expireAfterWrite=30m

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hermes}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.hermes.broker: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

springdoc:
  show-actuator: true

trading:
  scheduler:
    enabled: ${TRADING_SCHEDULER_ENABLED:false}
  risk:
    live-trading-enabled: ${LIVE_TRADING_ENABLED:false}
    daily-max-loss-rate: ${DAILY_MAX_LOSS_RATE:0.03}
    max-order-amount: ${MAX_ORDER_AMOUNT:100000}
    max-daily-trades: ${MAX_DAILY_TRADES:5}
    max-position-count: ${MAX_POSITION_COUNT:5}
    allow-averaging-down: ${ALLOW_AVERAGING_DOWN:false}

external-api:
  fail-fast: ${EXTERNAL_API_FAIL_FAST:false}
  opendart:
    enabled: ${OPENDART_ENABLED:true}
    base-url: https://opendart.fss.or.kr
    api-key: ${OPENDART_API_KEY:}
    connect-timeout: ${OPENDART_CONNECT_TIMEOUT:3s}
    read-timeout: ${OPENDART_READ_TIMEOUT:10s}
    corp-code-cache-ttl: ${OPENDART_CORP_CODE_CACHE_TTL:24h}
    corp-code-sync-cron: '${OPENDART_CORP_CODE_SYNC_CRON:0 0 4 * * *}'
  naver-news:
    enabled: ${NAVER_NEWS_ENABLED:true}
    base-url: https://openapi.naver.com
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
    connect-timeout: ${NAVER_NEWS_CONNECT_TIMEOUT:3s}
    read-timeout: ${NAVER_NEWS_READ_TIMEOUT:5s}
    default-display: ${NAVER_NEWS_DEFAULT_DISPLAY:20}
    max-display: ${NAVER_NEWS_MAX_DISPLAY:100}
    cache-ttl: ${NAVER_NEWS_CACHE_TTL:10m}
