kis:
  environment: MOCK
  base-url: https://openapivts.koreainvestment.com:29443
  account:
    rate-limit-key: mock-primary-account
  rate-limit:
    requests-per-second: 1
    minimum-interval: 1100ms
    acquire-timeout: 30s
  retry:
    query:
      max-attempts: 3
      initial-delay: 1200ms
      multiplier: 2.0
      max-delay: 3s
      jitter-min: 100ms
      jitter-max: 300ms
    order:
      max-attempts: 1
  api:
    app-key: ${KIS_MOCK_APP_KEY:your_mock_app_key_here}
    app-secret: ${KIS_MOCK_APP_SECRET:your_mock_app_secret_here}
    account-no: ${KIS_MOCK_ACCOUNT_NO:12345678-01}
    connect-timeout: ${KIS_CONNECT_TIMEOUT:3s}
    read-timeout: ${KIS_READ_TIMEOUT:10s}

trading:
  mode: PAPER

spring:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    open-in-view: false
