kis:
  environment: PRODUCTION
  base-url: https://openapi.koreainvestment.com:9443
  production-rate-limit-type: NEW_APPLICANT
  account:
    rate-limit-key: production-primary-account
  rate-limit:
    requests-per-second: 3
    minimum-interval: 400ms
    acquire-timeout: 15s
  retry:
    query:
      max-attempts: 3
      initial-delay: 500ms
      multiplier: 2.0
      max-delay: 2s
      jitter-min: 100ms
      jitter-max: 300ms
    order:
      max-attempts: 1
  api:
    app-key: ${KIS_PROD_APP_KEY:your_prod_app_key_here}
    app-secret: ${KIS_PROD_APP_SECRET:your_prod_app_secret_here}
    account-no: ${KIS_PROD_ACCOUNT_NO:12345678-01}

trading:
  mode: LIVE
